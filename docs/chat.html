<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>챗봇 · 구덩이매매법</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tailwind.config.js"></script>
  <link rel="stylesheet" href="assets/app.css" />
</head>

<body class="bg-toss-bg text-toss-dark">

  <header id="app-header" class="sticky top-0 z-40 bg-toss-bg/90 backdrop-blur border-b border-toss-border"></header>

  <main class="main-content max-w-3xl mx-auto px-5 py-6 space-y-4">

    <section class="bg-toss-card rounded-tossLg p-6 shadow-toss animate-fadein">
      <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
        <h1 class="text-2xl font-extrabold">🤖 구덩이 챗봇</h1>
        <button onclick="openChatSettings()" class="text-toss-sub hover:text-toss-dark text-lg" title="Gemini 키 설정">⚙️</button>
      </div>
      <p class="text-sm text-toss-text leading-relaxed">
        구덩이매매법 원칙과 <strong>현재 시장 상태</strong>를 알고 있는 GPT. <br/>
        "지금 매수해도 되나?", "원칙상 매도 타이밍?" 같은 질문을 해보세요.
      </p>
    </section>

    <!-- 대화 영역 -->
    <section class="bg-toss-card rounded-tossLg shadow-toss flex flex-col" style="min-height: 60vh">
      <div id="chat-messages" class="flex-1 p-4 space-y-3 overflow-y-auto" style="max-height: 60vh">
        <!-- 메시지 -->
      </div>
      <div class="border-t border-toss-border p-3 flex gap-2">
        <textarea id="chat-input" rows="1" placeholder="질문을 입력하세요..."
                  class="flex-1 px-3 py-2 border border-toss-border rounded-toss text-sm resize-none"
                  onkeydown="handleInputKey(event)"></textarea>
        <button id="chat-send" onclick="sendMessage()" disabled
                class="px-4 py-2 text-sm font-semibold text-white bg-toss-blue rounded-toss disabled:bg-gray-300 whitespace-nowrap">
          전송
        </button>
      </div>
    </section>

    <div class="text-[11px] text-toss-sub text-center leading-relaxed">
      💡 답변은 참고용 · 실제 투자 판단과 주문은 본인 책임 <br/>
      현재 대화는 브라우저에만 저장 (새로고침 시 초기화)
    </div>

    <footer class="text-center py-6 text-xs text-toss-sub">
      구덩이매매법 · 개인 매매 원칙 기록
    </footer>

  </main>

  <!-- 설정 모달 -->
  <div id="chat-settings-modal" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4" onclick="closeChatSettings(event)">
    <div class="bg-toss-card rounded-tossLg max-w-md w-full shadow-toss" onclick="event.stopPropagation()">
      <div class="p-6 border-b border-toss-border flex items-center justify-between">
        <h2 class="text-xl font-bold">⚙️ 챗봇 설정</h2>
        <button onclick="closeChatSettings()" class="text-toss-sub text-2xl leading-none px-2">×</button>
      </div>
      <div class="p-6 space-y-4">
        <div>
          <div class="text-sm font-semibold mb-2">Gemini API Key</div>
          <input id="chat-gemini-key" type="password" placeholder="AIzaSy... 또는 ghp_..."
                 class="w-full px-3 py-2 border border-toss-border rounded-toss text-sm font-mono" />
          <div class="text-[11px] text-toss-sub mt-2 leading-relaxed">
            • 챗봇이 Gemini API 호출 시 사용<br/>
            • 브라우저 localStorage에만 저장 (서버 전송 X)<br/>
            • 새 키 발급: <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-toss-blue underline">Google AI Studio</a>
          </div>
        </div>
        <div id="chat-settings-status" class="text-xs"></div>
        <div class="flex gap-2 justify-end pt-2 border-t border-toss-border">
          <button onclick="clearGeminiKey()" class="px-3 py-2 text-xs text-toss-red">삭제</button>
          <button onclick="saveGeminiKey()" class="px-4 py-2 text-xs font-semibold text-white bg-toss-blue rounded-toss">저장</button>
        </div>
      </div>
    </div>
  </div>

  <nav id="bottom-nav"></nav>

  <script src="assets/common.js"></script>
  <script>
    PI.initNav('chat');

    const GEMINI_KEY_STORAGE = 'pitinvest_gemini_key';
    const GEMINI_MODEL = 'gemini-2.5-flash';

    // 구덩이매매법 원칙 (시스템 프롬프트용)
    const PRINCIPLES = `## 구덩이매매법 핵심 원칙

### 자산 구성
- 평시: 코어 100% (QQQ 1/3 + SOXX 1/3 + EWY 1/3)
- 위성 종목: TQQQ + SOXL + KORU (각 1/3)
- 매도 3조건 → 전량 현금화 / 긴급탈출 → 위성만 청산 (코어 유지)

### 매수 3대 조건 (공포 진입)
1. CNN Fear & Greed < 10 (극단적 공포)
2. VIX > 25 (장중 High 기준 · 변동성 급등)
3. 국내 강제청산 (반대매매 뉴스 + 개인 1조원↑ 매도)

매수 규칙 (v5.0):
- 각 조건 "첫 트리거" 시 → 위성 +33%p (1/3 step). 보유 중인 위성 종목에 균등 분산.
- 3개 다 발동 → 카운터 리셋 (다시 매수 신호 카운트 가능, 위성 100% cap)
- 신호 sticky: 한 번 발동된 신호는 사이클 동안 유지

### 매도 3대 조건 (탈출)
1. 위성 +100% 수익률 (TQQQ/SOXL/KORU 중 하나라도 이론평단 2배)
2. 주도주 3일 연속 상승 (삼성전자 AND SK하이닉스 모두) + 개인 매수 우위
3. 전문가 경고 (박병창 AND 윤지호 모두 "현금 비중 늘리자" 급 권고)

매도 행동 (v5.0):
- 각 조건 "첫 트리거" 시 → 위성 −33%p (1/3 step). 보유 중인 위성 균등 매도, 자금은 현금으로
- 3개 모두 충족 → 위성 0% (코어 유지, 긴급탈출과 일관). 사이클 리셋
- 긴급탈출 (나스닥/S&P/코스피 -10%) → 위성만 즉시 청산, 코어는 유지
- 매도1 sticky: 가격 떨어져도 신호 유지 (이미 익절 완료, 추가 액션 없음)

### 원칙 해석
- 단순 "조심하세요", "리스크 있다" 같은 경각심은 매도 신호 아님
- 구체적 "현금 비중 늘리자", "익절", "매도" 같은 행동 권고만 매도 신호
- 공포 없이 매수 X, 탐욕 없이 매도 X
- 예측 말고 신호 기반 기계적 대응

### 데이터 출처 구분 (중요)
- "현재 시장 상태"의 시그널/지수 등은 **시장 데이터** (yfinance 실시간)
- "내 포지션 ratio_raw / total_krw"는 **사용자 실계좌** (master_data.json 직접 입력)
- "올해 수익률" 또는 "+214%" 같은 수치는 **백테스트 시뮬 결과** (1/1 60:40 가정)
- 절대 백테스트 수치를 "사용자 실수익률"으로 인용하지 말 것.
- 사용자가 본인 실수익을 물으면 master_data ratio + total_krw에서 답변.`;

    function getKey() { return localStorage.getItem(GEMINI_KEY_STORAGE) || ''; }

    function openChatSettings() {
      const k = getKey();
      PI.$('chat-gemini-key').value = k;
      PI.$('chat-settings-status').innerHTML = k
        ? '<span class="text-toss-green">✓ 저장된 키 있음</span>'
        : '<span class="text-toss-sub">키 없음 · 저장 필요</span>';
      PI.$('chat-settings-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    function closeChatSettings(e) {
      if (e && e.target !== e.currentTarget) return;
      PI.$('chat-settings-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }
    function saveGeminiKey() {
      const v = PI.$('chat-gemini-key').value.trim();
      if (!v) { PI.$('chat-settings-status').innerHTML = '<span class="text-toss-red">키 입력 필요</span>'; return; }
      localStorage.setItem(GEMINI_KEY_STORAGE, v);
      PI.$('chat-settings-status').innerHTML = '<span class="text-toss-green">✅ 저장됨</span>';
      updateSendButton();
    }
    function clearGeminiKey() {
      localStorage.removeItem(GEMINI_KEY_STORAGE);
      PI.$('chat-gemini-key').value = '';
      PI.$('chat-settings-status').innerHTML = '<span class="text-toss-sub">삭제됨</span>';
      updateSendButton();
    }

    // ============================================================
    // 시장 상태 요약
    // ============================================================
    let _snapshot = null;
    let _master = null;

    function summarizeMarket() {
      if (!_snapshot) return '(시장 데이터 로딩 중)';
      const s = _snapshot.signals || {};
      const lev = _snapshot.leverage_profit || {};
      const sell = _snapshot.sell_signals || {};
      const idx = _snapshot.indices || {};
      const vol = _snapshot.volatility || {};
      const sent = _snapshot.sentiment || {};
      const stage = s.stage_key_raw || 'normal';
      const master = _master || {};
      const ratio = master.ratio_raw || '-';
      const chk = v => v ? '✓' : '✗';
      const fmtN = (n, d=1) => n==null ? '-' : Number(n).toFixed(d);
      const expSt = _snapshot.expert_analysis?.expert_stance_map || {};

      return `
현재 구덩이 stage: ${stage} (${s.count||0} 매수 / ${s.sell_count||0} 매도 충족)
내 포지션: ${ratio} (현금:코어:위성)
${master.memo ? '메모: ' + master.memo : ''}

시장 지표:
- CNN Fear&Greed: ${fmtN(sent.cnn_fng, 0)} (조건: <10 ${chk(s.cnn_under_10)})
- VIX: ${fmtN(vol.vix)} (조건: >25 ${chk(s.vix_over_25)})
- 강제청산 (반대매매 뉴스 + 개미 1조 매도): ${chk(s.margin_call_trigger)}
- 나스닥 52주고점 대비: ${fmtN(idx.nasdaq?.drop_pct, 2)}%
- 코스피 52주고점 대비: ${fmtN(idx.kospi?.drop_pct, 2)}%

매도 상태:
- 위성 +100%: ${chk(s.sell_leverage)} (TQQQ:${fmtN(lev.tqqq_profit_pct)}%, SOXL:${fmtN(lev.soxl_profit_pct)}%, KORU:${fmtN(lev.koru_profit_pct)}%)
- 주도주 3일↑ (삼전+하닉): ${chk(s.sell_leading)}
- 전문가 경고 (박병창+윤지호 AND): ${chk(s.sell_expert)} · 개별: ${JSON.stringify(expSt)}
- 긴급탈출 (-10%): ${chk(s.emergency_exit_warning)}

오늘의 봇 추천 액션: ${_snapshot.recommended_action || '-'}`.trim();
    }

    // ============================================================
    // 채팅 UI
    // ============================================================
    const chatMessages = [];  // {role, text}

    function renderMessages() {
      const wrap = PI.$('chat-messages');
      if (chatMessages.length === 0) {
        wrap.innerHTML = `
          <div class="text-center text-toss-sub text-sm py-10">
            <div class="mb-3">💬 대화를 시작해보세요</div>
            <div class="text-[11px] leading-relaxed">
              예시: <br/>
              "지금 매수 해도 되나?"<br/>
              "KORU가 +130% 인데 매도해야 돼?"<br/>
              "현재 구덩이 몇 단계?"<br/>
              "매도 시그널 뭐가 부족해?"
            </div>
          </div>
        `;
        return;
      }
      wrap.innerHTML = chatMessages.map(m => {
        if (m.role === 'user') {
          return `
            <div class="flex justify-end">
              <div class="max-w-[80%] bg-toss-blue text-white px-4 py-2 rounded-tossLg text-sm" style="word-break: keep-all;">
                ${escapeHtml(m.text)}
              </div>
            </div>
          `;
        } else {
          return `
            <div class="flex justify-start">
              <div class="max-w-[85%] bg-toss-bg px-4 py-2 rounded-tossLg text-sm leading-relaxed" style="word-break: keep-all;">
                ${m.loading ? '<span class="text-toss-sub">⏳ 생각 중...</span>' : escapeHtml(m.text).replace(/\n/g, '<br/>')}
              </div>
            </div>
          `;
        }
      }).join('');
      wrap.scrollTop = wrap.scrollHeight;
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function updateSendButton() {
      const input = PI.$('chat-input').value.trim();
      PI.$('chat-send').disabled = !input || !getKey();
    }

    function handleInputKey(e) {
      updateSendButton();
      // 한글 IME composition 중이면 Enter 무시 (마지막 글자 confirm 용 Enter 흡수 방지)
      if (e.isComposing || e.keyCode === 229) return;
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    document.getElementById('chat-input').addEventListener('input', updateSendButton);

    // ============================================================
    // Gemini 호출
    // ============================================================
    async function sendMessage() {
      const input = PI.$('chat-input');
      const text = input.value.trim();
      if (!text) return;
      const key = getKey();
      if (!key) { openChatSettings(); return; }

      chatMessages.push({ role: 'user', text });
      const aiMsg = { role: 'assistant', text: '', loading: true };
      chatMessages.push(aiMsg);
      input.value = '';
      updateSendButton();
      renderMessages();

      // 대화 이력 포함 요청 구성
      const systemPrompt = `${PRINCIPLES}

## 현재 시장 상태 (참고용 · 실제 데이터)
${summarizeMarket()}

## 답변 가이드
- 한국어로 친근하지만 단도직입적으로
- 항상 다음 구조로 답변:
  1) **상황 진단** (현재 어떤 stage / 어떤 신호가 켜져있는지 요약)
  2) **구체 액션** (몇 %p, 어느 종목, 얼마, 언제 — 숫자로 명시)
  3) **근거** (어떤 매수/매도 조건 발동인지)
  4) **주의점** (있다면 1줄)
- "알려드릴게요", "정확한 액션을 바로", "잠시만요" 같은 메타·서론 멘트 절대 금지 — 바로 본론
- 원칙이 커버하지 않는 영역이면 "원칙상 규정 없음" 명시 후 보수적 보류 권고
- "이건 투자자문이 아닙니다" 같은 disclaimer 반복 금지 (이미 UI에 명시)
- 사용자가 "더 자세히" 요청하면 같은 답을 풀어쓰지 말고 새로운 정보(과거 트리거 이력, 다른 시나리오 분기 등)를 추가
- 수치는 무조건 위 "현재 시장 상태"에서 인용 (지어내지 말 것)`;

      const contents = [];
      // 이력 (최근 10개만)
      const recent = chatMessages.slice(-11, -1);
      for (const m of recent) {
        contents.push({
          role: m.role === 'user' ? 'user' : 'model',
          parts: [{ text: m.text }],
        });
      }
      // 현재 사용자 메시지
      contents.push({ role: 'user', parts: [{ text }] });

      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(key)}`;
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: systemPrompt }] },
            contents,
            generationConfig: {
              temperature: 0.7,
              maxOutputTokens: 2048,
              thinkingConfig: { thinkingBudget: 0 },  // 2.5-flash thinking 비활성: 출력 토큰 보존
            },
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(`HTTP ${res.status} · ${err.error?.message || '응답 실패'}`);
        }
        const data = await res.json();
        const cand = data.candidates?.[0];
        const reply = cand?.content?.parts?.[0]?.text?.trim();
        if (reply) {
          aiMsg.text = reply;
        } else {
          // 토큰 한도 초과 / 안전 필터 등으로 빈 응답일 때 원인 노출
          const reason = cand?.finishReason || 'unknown';
          aiMsg.text = `(빈 응답 · finishReason=${reason}${reason === 'MAX_TOKENS' ? ' — maxOutputTokens 한도 초과' : ''})`;
        }
        aiMsg.loading = false;
      } catch (e) {
        aiMsg.text = `❌ ${e.message}`;
        aiMsg.loading = false;
      }
      renderMessages();
    }

    // 초기화: snapshot + master 로드
    (async () => {
      try {
        const [master, snap] = await Promise.all([
          PI.fetchJson(PI.URLS.master).catch(() => null),
          PI.fetchJson(PI.URLS.snapshot).catch(() => null),
        ]);
        _master = master;
        _snapshot = snap;
      } catch (e) { console.warn(e); }
      renderMessages();
      updateSendButton();
    })();

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeChatSettings();
    });
  </script>
</body>
</html>
